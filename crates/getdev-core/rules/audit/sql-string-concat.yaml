id: audit/sql-string-concat
severity: medium
confidence: high
languages: [javascript, typescript, tsx, python]
description: >
  SQL query text built by string concatenation (+/%) or f-string/template-
  literal interpolation directly inside a database execute/executemany/query
  call, instead of a parameterized query — the classic SQL injection shape
  AI assistants routinely emit when asked to "query the database".
  Reframed to medium/proportionate wording (PREC-05/D-15): getdev is
  deterministic and does no dataflow/taint analysis, so it observes only the
  interpolation SHAPE, not proven attacker control. A parameterized ORM tagged
  template (Drizzle's sql``) is safe and does not fire.
message: "string-interpolated SQL — review for injection"
remediation: >
  Use parameterized queries (placeholders plus a separate params argument,
  e.g. cursor.execute(sql, params) or db.query("... WHERE id = ?", [id]))
  instead of concatenating or interpolating values directly into the SQL
  string.
refs:
  - https://getdev.ai/rules/audit/sql-string-concat
matchers:
  # Python: f-string interpolation as the sole argument to execute/
  # executemany/query (04-RESEARCH.md "Verified: Python f-string
  # interpolation node shape").
  - language: python
    query: |
      (call
        function: (attribute
          attribute: (identifier) @method
          (#any-of? @method "execute" "executemany" "query"))
        arguments: (argument_list (string (interpolation) @finding)))
  # Python: +/% string concatenation as the sole argument to execute/
  # executemany/query — `binary_operator` covers both operator variants
  # with a single query (04-RESEARCH.md Code Examples).
  - language: python
    query: |
      (call
        function: (attribute
          attribute: (identifier) @method
          (#any-of? @method "execute" "executemany" "query"))
        arguments: (argument_list (binary_operator) @finding))
  # JS: `+` string concatenation as an argument to execute/query.
  - language: javascript
    query: |
      (call_expression
        function: (member_expression
          property: (property_identifier) @method
          (#any-of? @method "execute" "query"))
        arguments: (arguments (binary_expression) @finding))
  # JS: template-literal interpolation (`${...}`) as an argument to
  # execute/query.
  - language: javascript
    query: |
      (call_expression
        function: (member_expression
          property: (property_identifier) @method
          (#any-of? @method "execute" "query"))
        arguments: (arguments (template_string (template_substitution) @finding)))
  # TypeScript mirrors of the two JS shapes above (same node types).
  - language: typescript
    query: |
      (call_expression
        function: (member_expression
          property: (property_identifier) @method
          (#any-of? @method "execute" "query"))
        arguments: (arguments (binary_expression) @finding))
  - language: tsx
    query: |
      (call_expression
        function: (member_expression
          property: (property_identifier) @method
          (#any-of? @method "execute" "query"))
        arguments: (arguments (binary_expression) @finding))
  - language: typescript
    query: |
      (call_expression
        function: (member_expression
          property: (property_identifier) @method
          (#any-of? @method "execute" "query"))
        arguments: (arguments (template_string (template_substitution) @finding)))
  - language: tsx
    query: |
      (call_expression
        function: (member_expression
          property: (property_identifier) @method
          (#any-of? @method "execute" "query"))
        arguments: (arguments (template_string (template_substitution) @finding)))
fixtures:
  positive:
    - positive/sql_concat_fstring_py.py
    - positive/sql_concat_percent_py.py
    - positive/sql_concat_plus_js.js
    - positive/sql_concat_template_js.js
    - positive/sql_concat_plus_ts.ts
    - positive/sql_concat_tsx.tsx
    - positive/sql_concat_template_ts.ts
  negative:
    - negative/sql_concat_neg_parameterized_py.py
    - negative/sql_concat_neg_placeholder_js.js
    - negative/sql_concat_neg_orm_js.js
    - negative/sql_concat_neg_constant_py.py
    - negative/sql_concat_neg_unrelated_concat_js.js
    # PREC-05 (13-05): parameterized ORM (Drizzle `sql`) tagged-template
    # arguments are safe and must not fire.
    - negative/sql_concat_neg_drizzle_sql_tag_ts.ts
    - negative/sql_concat_neg_drizzle_sql_tag_js.js
    - negative/sql_concat_neg_orm_tag_ts.ts
