id: audit/shell-interpolation
severity: high
confidence: high
languages: [javascript, typescript, tsx]
description: >
  child_process.exec/execSync invoked with a template literal that
  interpolates a runtime value — shell metacharacters in the interpolated
  value let an attacker inject arbitrary shell commands.
message: "Shell command built from an interpolated template literal (shell injection risk)"
remediation: >
  Avoid building shell command strings via template literals. Prefer
  child_process.execFile/spawn with the command and its arguments passed as
  a separate array, which never invokes a shell.
refs:
  - https://getdev.ai/rules/audit/shell-interpolation
matchers:
  - language: javascript
    query: |
      (call_expression
        function: (member_expression
          object: (identifier) @obj (#eq? @obj "child_process")
          property: (property_identifier) @method (#any-of? @method "exec" "execSync"))
        arguments: (arguments (template_string (template_substitution) @finding)))
  - language: typescript
    query: |
      (call_expression
        function: (member_expression
          object: (identifier) @obj (#eq? @obj "child_process")
          property: (property_identifier) @method (#any-of? @method "exec" "execSync"))
        arguments: (arguments (template_string (template_substitution) @finding)))
  - language: tsx
    query: |
      (call_expression
        function: (member_expression
          object: (identifier) @obj (#eq? @obj "child_process")
          property: (property_identifier) @method (#any-of? @method "exec" "execSync"))
        arguments: (arguments (template_string (template_substitution) @finding)))
fixtures:
  positive:
    - positive/shell_interp_exec_js.js
    - positive/shell_interp_execsync_js.js
    - positive/shell_interp_exec_ts.ts
    - positive/shell_interp_tsx.tsx
  negative:
    - negative/shell_interp_neg_static_js.js
    - negative/shell_interp_neg_execfile_args_js.js
    - negative/shell_interp_neg_no_substitution_js.js
    - negative/shell_interp_neg_static_ts.ts
