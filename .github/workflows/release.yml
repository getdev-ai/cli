#
# CI that:
#
# * checks for a Git Tag that looks like a release
# * builds artifacts with dist (archives, installers, hashes)
# * uploads those artifacts to temporary workflow zip
# * on success, uploads the artifacts to a GitHub Release
#
# Note that the GitHub Release will be created with a generated
# title/body based on your changelogs.

name: Release
permissions:
  "contents": "write"

# This task will run whenever you push a git tag that looks like a version
# like "1.0.0", "v0.1.0-prerelease.1", "my-app/0.1.0", "releases/v1.0.0", etc.
# Various formats will be parsed into a VERSION and an optional PACKAGE_NAME, where
# PACKAGE_NAME must be the name of a Cargo package in your workspace, and VERSION
# must be a Cargo-style SemVer Version (must have at least major.minor.patch).
#
# If PACKAGE_NAME is specified, then the announcement will be for that
# package (erroring out if it doesn't have the given version or isn't dist-able).
#
# If PACKAGE_NAME isn't specified, then the announcement will be for all
# (dist-able) packages in the workspace with that version (this mode is
# intended for workspaces with only one dist-able package, or with all dist-able
# packages versioned/released in lockstep).
#
# If you push multiple tags at once, separate instances of this workflow will
# spin up, creating an independent announcement for each one. However, GitHub
# will hard limit this to 3 tags per commit, as it will assume more tags is a
# mistake.
#
# If there's a prerelease-style suffix to the version, then the release(s)
# will be marked as a prerelease.
on:
  pull_request:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

jobs:
  # Run 'dist plan' (or host) to determine what tasks we need to do
  plan:
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ !github.event.pull_request && github.ref_name || '' }}
      tag-flag: ${{ !github.event.pull_request && format('--tag={0}', github.ref_name) || '' }}
      publishing: ${{ !github.event.pull_request }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install dist
        # we specify bash to get pipefail; it guards against the `curl` command
        # failing. otherwise `sh` won't catch that `curl` returned non-0
        shell: bash
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.32.0/cargo-dist-installer.sh | sh"
      - name: Cache dist
        uses: actions/upload-artifact@v7
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/dist
      # sure would be cool if github gave us proper conditionals...
      # so here's a doubly-nested ternary-via-truthiness to try to provide the best possible
      # functionality based on whether this is a pull_request, and whether it's from a fork.
      # (PRs run on the *source* but secrets are usually on the *target* -- that's *good*
      # but also really annoying to build CI around when it needs secrets to work right.)
      - id: plan
        run: |
          dist ${{ (!github.event.pull_request && format('host --steps=create --tag={0}', github.ref_name)) || 'plan' }} --output-format=json > plan-dist-manifest.json
          echo "dist ran successfully"
          cat plan-dist-manifest.json
          echo "manifest=$(jq -c "." plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  # Build and packages all the platform-specific things
  build-local-artifacts:
    name: build-local-artifacts (${{ join(matrix.targets, ', ') }})
    # Let the initial task tell us to not run (currently very blunt)
    needs:
      - plan
    if: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix.include != null && (needs.plan.outputs.publishing == 'true' || fromJson(needs.plan.outputs.val).ci.github.pr_run_mode == 'upload') }}
    strategy:
      fail-fast: false
      # Target platforms/runners are computed by dist in create-release.
      # Each member of the matrix has the following arguments:
      #
      # - runner: the github runner
      # - dist-args: cli flags to pass to dist
      # - install-dist: expression to run to install dist on the runner
      #
      # Typically there will be:
      # - 1 "global" task that builds universal installers
      # - N "local" tasks that build each platform's binaries and platform-specific installers
      matrix: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container && matrix.container.image || null }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/${{ join(matrix.targets, '-') }}-dist-manifest.json
    permissions:
      "attestations": "write"
      "contents": "read"
      "id-token": "write"
    steps:
      - name: enable windows longpaths
        run: |
          git config --global core.longpaths true
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust non-interactively if not already installed
        if: ${{ matrix.container }}
        run: |
          if ! command -v cargo > /dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          fi
      - uses: swatinem/rust-cache@v2
        with:
          key: ${{ join(matrix.targets, '-') }}
          cache-provider: ${{ matrix.cache_provider }}
      - name: Install dist
        run: ${{ matrix.install_dist.run }}
      # Get the dist-manifest
      - name: Fetch local artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - name: Install dependencies
        run: |
          ${{ matrix.packages_install }}
      - name: Build artifacts
        run: |
          # Actually do builds and make zips and whatnot
          dist build ${{ needs.plan.outputs.tag-flag }} --print=linkage --output-format=json ${{ matrix.dist_args }} > dist-manifest.json
          echo "dist ran successfully"
      - name: Attest
        uses: actions/attest@v4
        with:
          subject-path: "target/distrib/*${{ join(matrix.targets, ', ') }}*"
      - id: cargo-dist
        name: Post-build
        # We force bash here just because github makes it really hard to get values up
        # to "real" actions without writing to env-vars, and writing to env-vars has
        # inconsistent syntax between shell and powershell.
        shell: bash
        run: |
          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          dist print-upload-files-from-manifest --manifest dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-build-local-${{ join(matrix.targets, '_') }}
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  # Build and package all the platform-agnostic(ish) things
  build-global-artifacts:
    needs:
      - plan
      - build-local-artifacts
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/global-dist-manifest.json
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v8
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Get all the local artifacts for the global tasks to use (for e.g. checksums)
      - name: Fetch local artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: cargo-dist
        shell: bash
        run: |
          dist build ${{ needs.plan.outputs.tag-flag }} --output-format=json "--artifacts=global" > dist-manifest.json
          echo "dist ran successfully"

          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          jq --raw-output ".upload_files[]" dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-build-global
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}
  # Determines if we should publish/announce
  host:
    needs:
      - plan
      - build-local-artifacts
      - build-global-artifacts
    # Only run if we're "publishing", and only if plan, local and global didn't fail (skipped is fine)
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.publishing == 'true' && (needs.build-global-artifacts.result == 'skipped' || needs.build-global-artifacts.result == 'success') && (needs.build-local-artifacts.result == 'skipped' || needs.build-local-artifacts.result == 'success') }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.host.outputs.manifest }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v8
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Fetch artifacts from scratch-storage
      - name: Fetch artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: host
        shell: bash
        run: |
          dist host ${{ needs.plan.outputs.tag-flag }} --steps=upload --steps=release --output-format=json > dist-manifest.json
          echo "artifacts uploaded and released successfully"
          cat dist-manifest.json
          echo "manifest=$(jq -c "." dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v7
        with:
          # Overwrite the previous copy
          name: artifacts-dist-manifest
          path: dist-manifest.json
      # Create a GitHub Release while uploading all files to it
      - name: "Download GitHub Artifacts"
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true
      - name: Cleanup
        run: |
          # Remove the granular manifests
          rm -f artifacts/*-dist-manifest.json
      - name: Create GitHub Release
        env:
          PRERELEASE_FLAG: "${{ fromJson(steps.host.outputs.manifest).announcement_is_prerelease && '--prerelease' || '' }}"
          ANNOUNCEMENT_TITLE: "${{ fromJson(steps.host.outputs.manifest).announcement_title }}"
          ANNOUNCEMENT_BODY: "${{ fromJson(steps.host.outputs.manifest).announcement_github_body }}"
          RELEASE_COMMIT: "${{ github.sha }}"
        run: |
          # Write and read notes from a file to avoid quoting breaking things
          echo "$ANNOUNCEMENT_BODY" > $RUNNER_TEMP/notes.txt

          gh release create "${{ needs.plan.outputs.tag }}" --target "$RELEASE_COMMIT" $PRERELEASE_FLAG --title "$ANNOUNCEMENT_TITLE" --notes-file "$RUNNER_TEMP/notes.txt" artifacts/*

  publish-homebrew-formula:
    needs:
      - plan
      - host
    runs-on: "ubuntu-22.04"
    # GHA-002: the cross-repo tap-push token sits behind the required-reviewer
    # `release` environment gate, so a compromised PR can never reach it.
    # GHA-001: third-party actions below are pinned to a full commit SHA.
    # NOTE — this is a cargo-dist-GENERATED job: `dist generate --mode ci`
    # regenerates it and will DROP this `environment:` line and the SHA pins
    # below. Re-apply GHA-001/002 after any deliberate dist regeneration
    # (documented in docs/RELEASING.md).
    environment: release
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PLAN: ${{ needs.plan.outputs.val }}
      GITHUB_USER: "axo bot"
      GITHUB_EMAIL: "admin+bot@axo.dev"
    if: ${{ !fromJson(needs.plan.outputs.val).announcement_is_prerelease || fromJson(needs.plan.outputs.val).publish_prereleases }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: true
          repository: "getdev-ai/homebrew-tap"
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      # So we have access to the formula
      - name: Fetch homebrew formulae
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          pattern: artifacts-*
          path: Formula/
          merge-multiple: true
      # This is extra complex because you can make your Formula name not match your app name
      # so we need to find releases with a *.rb file, and publish with that filename.
      - name: Commit formula files
        run: |
          git config --global user.name "${GITHUB_USER}"
          git config --global user.email "${GITHUB_EMAIL}"

          for release in $(echo "$PLAN" | jq --compact-output '.releases[] | select([.artifacts[] | endswith(".rb")] | any)'); do
            filename=$(echo "$release" | jq '.artifacts[] | select(endswith(".rb"))' --raw-output)
            name=$(echo "$filename" | sed "s/\.rb$//")
            version=$(echo "$release" | jq .app_version --raw-output)

            export PATH="/home/linuxbrew/.linuxbrew/bin:$PATH"
            brew update
            # We avoid reformatting user-provided data such as the app description and homepage.
            brew style --except-cops FormulaAudit/Homepage,FormulaAudit/Desc,FormulaAuditStrict --fix "Formula/${filename}" || true

            git add "Formula/${filename}"
            git commit -m "${name} ${version}"
          done
          git push

  publish-npm:
    needs:
      - plan
      - host
    runs-on: "ubuntu-22.04"
    # GHA-002: NPM_TOKEN sits behind the required-reviewer `release` environment
    # gate. GHA-001: third-party actions below are pinned to a full commit SHA.
    # NOTE — cargo-dist-GENERATED job: `dist generate --mode ci` regenerates it
    # and DROPS this `environment:` line and the SHA pins; re-apply GHA-001/002
    # after any deliberate dist regeneration (docs/RELEASING.md).
    environment: release
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PLAN: ${{ needs.plan.outputs.val }}
    if: ${{ !fromJson(needs.plan.outputs.val).announcement_is_prerelease || fromJson(needs.plan.outputs.val).publish_prereleases }}
    steps:
      - name: Fetch npm packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          pattern: artifacts-*
          path: npm/
          merge-multiple: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
      - run: |
          for release in $(echo "$PLAN" | jq --compact-output '.releases[] | select([.artifacts[] | endswith("-npm-package.tar.gz")] | any)'); do
            pkg=$(echo "$release" | jq '.artifacts[] | select(endswith("-npm-package.tar.gz"))' --raw-output)
            npm publish --access public "./npm/${pkg}"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  announce:
    needs:
      - plan
      - host
      - publish-homebrew-formula
      - publish-npm
    # use "always() && ..." to allow us to wait for all publish jobs while
    # still allowing individual publish jobs to skip themselves (for prereleases).
    # "host" however must run to completion, no skipping allowed!
    if: ${{ always() && needs.host.result == 'success' && (needs.publish-homebrew-formula.result == 'skipped' || needs.publish-homebrew-formula.result == 'success') && (needs.publish-npm.result == 'skipped' || needs.publish-npm.result == 'success') }}
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

  # ===========================================================================
  # --- getdev custom (NOT cargo-dist-managed) -------------------------------
  #
  # Everything below this line is hand-written and lives AFTER the generated
  # sections so a future `dist generate --mode ci` never clobbers it
  # (08-RESEARCH Pitfall 3). cargo-dist owns: build/checksum/attest/host and the
  # native npm+homebrew publish jobs above. It does NOT own: the keyed-cosign
  # self-update signature, the Syft SBOM, the 25 MB binary-size gate, the Scoop
  # manifest bump, or the ordered crates.io publish — those are the jobs here.
  # ===========================================================================

  # Keyed cosign signature over SHA256SUMS + Syft SBOM + 25 MB binary-size gate.
  # This job produces the EXACT artifact `getdev update` verifies in-process with
  # its embedded p256 key (SHA256SUMS.sig — a cosign 2.x legacy detached
  # base64(ASN.1-DER ECDSA-P256) signature; D-01). It only runs on a real tag
  # push (publishing == 'true'), never on pull_request, so a PR can never reach
  # COSIGN_PRIVATE_KEY (threat T-08-16). Secrets come from the `release`
  # environment with required-reviewer protection (provisioned in 08-08).
  getdev-sign-sbom-size:
    name: getdev-sign-sbom-size (custom)
    needs:
      - plan
      - host
    if: ${{ needs.plan.outputs.publishing == 'true' && needs.host.result == 'success' }}
    runs-on: "ubuntu-22.04"
    # The `release` environment gates COSIGN_PRIVATE_KEY/COSIGN_PASSWORD behind a
    # required reviewer (repo setting created in 08-08).
    environment: release
    permissions:
      contents: write   # upload SHA256SUMS + .sig + SBOM to the release
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ needs.plan.outputs.tag }}
    steps:
      # GHA-001: third-party actions pinned to a full commit SHA in this
      # secret-bearing (COSIGN_PRIVATE_KEY) job. anchore/sbom-action was pinned
      # first — it is the weakest (a moving major-zero `v0` tag).
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      # Pull every built artifact (release archives + per-artifact .sha256) that
      # the build jobs staged, so we can size-gate, aggregate, sign, and SBOM them.
      - name: Fetch built artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          pattern: artifacts-*
          path: dist-artifacts/
          merge-multiple: true
      # 25 MB binary-size gate (REQ-single-binary / REQ-perf-budgets). Extract the
      # getdev binary out of each release archive and fail the release if any
      # exceeds the 25 MiB (26214400-byte) budget — enforced, not just documented.
      - name: Binary-size gate (< 25 MB per target)
        shell: bash
        run: |
          set -euo pipefail
          MAX_BYTES=26214400   # 25 * 1024 * 1024
          workdir="$(mktemp -d)"
          fail=0
          shopt -s nullglob
          for archive in dist-artifacts/getdev-*.tar.xz dist-artifacts/getdev-*.zip; do
            rm -rf "${workdir:?}/x" && mkdir -p "$workdir/x"
            case "$archive" in
              *.tar.xz) tar -xf "$archive" -C "$workdir/x" ;;
              *.zip)    unzip -qo "$archive" -d "$workdir/x" ;;
            esac
            # the binary is `getdev` (unix) or `getdev.exe` (windows), anywhere in the tree
            while IFS= read -r -d '' bin; do
              size=$(stat -c%s "$bin")
              printf '  %-52s %10d bytes\n' "$(basename "$archive")" "$size"
              if [ "$size" -ge "$MAX_BYTES" ]; then
                echo "::error::$(basename "$archive"): binary is ${size} bytes (>= ${MAX_BYTES}); exceeds the 25 MB single-binary budget"
                fail=1
              fi
            done < <(find "$workdir/x" -type f \( -name getdev -o -name getdev.exe \) -print0)
          done
          if [ "$fail" -ne 0 ]; then
            echo "binary-size gate failed — see errors above"
            exit 1
          fi
          echo "binary-size gate passed (all targets < 25 MB)"
      # Aggregate the per-target checksums into ONE coreutils-format SHA256SUMS
      # manifest, keyed by the release-artifact BASENAME — the exact basenames
      # `getdev update`'s checksum gate matches against (update/checksum.rs). We
      # recompute from the archives so the manifest is self-consistent with what
      # is actually uploaded (equivalent to, but more robust than, concatenating
      # the individual .sha256 files whose filename fields may carry path prefixes).
      - name: Aggregate SHA256SUMS manifest
        shell: bash
        run: |
          set -euo pipefail
          (
            cd dist-artifacts
            shopt -s nullglob
            files=( getdev-*.tar.xz getdev-*.zip )
            if [ ${#files[@]} -eq 0 ]; then
              echo "no release archives found to checksum" >&2
              exit 1
            fi
            sha256sum "${files[@]}" > SHA256SUMS
          )
          echo "SHA256SUMS:"
          cat dist-artifacts/SHA256SUMS
      # Pin cosign to 2.x: 3.x defaults to the new Sigstore bundle format (+ Rekor
      # round-trip), which the embedded pure-Rust verifier (verify_detached) CANNOT
      # read. 2.4.3 emits the legacy base64(DER) detached signature the test vector
      # in testdata/update/signature/ was produced with. DO NOT bump without
      # re-proving compatibility against signature.rs.
      - name: Install cosign (pinned 2.x — legacy detached signature)
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da  # v3.7.0
        with:
          cosign-release: 'v2.4.3'
      # KEYED sign-blob over SHA256SUMS → SHA256SUMS.sig. --tlog-upload=false keeps
      # it fully offline (no Rekor), matching testdata/update/signature/README.md.
      # The key is the private half whose public half is embedded in the binary.
      - name: Keyed cosign sign SHA256SUMS
        working-directory: dist-artifacts
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          set -euo pipefail
          cosign sign-blob \
            --key env://COSIGN_PRIVATE_KEY \
            --tlog-upload=false \
            --yes \
            --output-signature SHA256SUMS.sig \
            SHA256SUMS
          echo "SHA256SUMS.sig (base64 DER ECDSA-P256):"
          cat SHA256SUMS.sig
      # Syft SBOM (SPDX-JSON) over the built artifacts. anchore/sbom-action wraps
      # the Syft Go binary (Anchore). Syft is NOT a Rust crate — there is no such
      # crate on crates.io; referencing one would be a hallucinated dependency (D-03).
      - name: Generate SBOM (Syft → SPDX-JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0 (was the moving v0 tag)
        with:
          path: dist-artifacts/
          format: spdx-json
          output-file: dist-artifacts/getdev-sbom.spdx.json
          upload-artifact: false
      # Name the SBOM with the version and upload SHA256SUMS + .sig + SBOM to the
      # release. --clobber is safe (these three assets are produced only here).
      - name: Upload signature, manifest, and SBOM to the release
        working-directory: dist-artifacts
        run: |
          set -euo pipefail
          version="${TAG#v}"
          cp getdev-sbom.spdx.json "getdev-${version}.sbom.spdx.json"
          gh release upload "$TAG" \
            SHA256SUMS \
            SHA256SUMS.sig \
            "getdev-${version}.sbom.spdx.json" \
            --clobber

  # Bump the manually-maintained Scoop manifest (DEC-14 — cargo-dist does not
  # manage Scoop) and push it to getdev-ai/scoop-bucket. The manifest's autoupdate
  # stanza is mirrored here: set `version`, the download `url`, and the `hash`
  # (fetched from the release's .sha256 asset) for the x86_64 Windows artifact.
  getdev-bump-scoop:
    name: getdev-bump-scoop (custom)
    needs:
      - plan
      - host
    if: ${{ needs.plan.outputs.publishing == 'true' && needs.host.result == 'success' }}
    runs-on: "ubuntu-22.04"
    # GHA-002: the cross-repo SCOOP_BUCKET_TOKEN sits behind the required-reviewer
    # `release` environment gate. GHA-001: checkouts pinned to a full commit SHA.
    environment: release
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ needs.plan.outputs.tag }}
    steps:
      - name: Checkout getdev source (for the manifest template)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
          path: src
      - name: Render the bumped Scoop manifest
        shell: bash
        run: |
          set -euo pipefail
          version="${TAG#v}"
          asset="getdev-x86_64-pc-windows-msvc.zip"
          url="https://github.com/getdev-ai/cli/releases/download/${TAG}/${asset}"
          # Pull the checksum from the release's per-artifact .sha256 asset.
          gh release download "$TAG" --repo getdev-ai/cli --pattern "${asset}.sha256" --dir . --clobber
          hash="$(awk '{print $1}' "${asset}.sha256" | head -n1)"
          if [ -z "$hash" ]; then echo "could not read $asset checksum" >&2; exit 1; fi
          jq \
            --arg version "$version" \
            --arg url "$url" \
            --arg hash "$hash" \
            '.version = $version
             | .architecture["64bit"].url = $url
             | .architecture["64bit"].hash = $hash' \
            src/packaging/scoop/getdev.json > getdev.json
          echo "rendered manifest:"; cat getdev.json
      - name: Push manifest to getdev-ai/scoop-bucket
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          repository: "getdev-ai/scoop-bucket"
          token: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          persist-credentials: true
          path: bucket
      - name: Commit the bumped manifest
        shell: bash
        run: |
          set -euo pipefail
          version="${TAG#v}"
          mkdir -p bucket/bucket
          cp getdev.json bucket/bucket/getdev.json
          cd bucket
          git config user.name "getdev-release-bot"
          git config user.email "release-bot@getdev.ai"
          git add bucket/getdev.json
          if git diff --cached --quiet; then
            echo "scoop manifest already up to date"
          else
            git commit -m "getdev ${version}"
            git push
          fi

  # Ordered crates.io publish (DEC-13). cargo-dist does NOT manage crates.io, so
  # this is a hand-appended custom job. Dependency order (docs/DISTRIBUTION.md):
  #   getdev-grammars -> getdev-core / getdev-registry / getdev-gitx -> getdev
  # cargo (>=1.66) waits for each published crate to appear in the index before
  # returning, so dependents resolve; a short sleep between tiers is belt-and-
  # suspenders. `cargo release`/`release-plz` are the documented alternatives if
  # manual ordering becomes error-prone.
  #
  # RELEASE-TIME TOGGLE (do NOT flip silently): every crate carries
  # `publish = false` as a pre-release guard. The v0.1 release procedure flips
  # all five to publishable in the release commit (see docs/RELEASING.md) — this
  # job assumes that has happened and will otherwise no-op-fail on the guard,
  # which is the intended safety behavior for any accidental pre-release tag.
  getdev-publish-crates:
    name: getdev-publish-crates (custom)
    needs:
      - plan
      - host
    if: ${{ needs.plan.outputs.publishing == 'true' && needs.host.result == 'success' }}
    runs-on: "ubuntu-22.04"
    environment: release
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      # GHA-001: third-party actions pinned to a full commit SHA in this
      # secret-bearing (CARGO_REGISTRY_TOKEN) job. `dtolnay/rust-toolchain@stable`
      # is a MOVING branch, so it is pinned to the branch-tip commit — bump
      # deliberately when refreshing the toolchain action.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
          submodules: recursive
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30  # stable
      - name: cargo publish (ordered — grammars, then libs, then getdev)
        shell: bash
        run: |
          set -euo pipefail
          # tier 1: the grammar/FFI foundation
          cargo publish -p getdev-grammars
          sleep 20
          # tier 2: the library crates (each depends only on grammars)
          cargo publish -p getdev-core
          cargo publish -p getdev-registry
          cargo publish -p getdev-gitx
          sleep 20
          # tier 3: the binary crate published as `getdev`
          cargo publish -p getdev
