# Provider-specific secret patterns — data, not code (docs/SPEC-RULES.md).
# Compiled by core::secrets; every pattern needs fixtures in
# testdata/fixtures/env/ (>=3 positive + >=3 negative overall pack coverage).
#
# `prefix` is the stable literal used for masked previews (docs/SPEC-FINDINGS.md:
# secret values NEVER appear unmasked anywhere).
version: 1
patterns:
  - id: stripe-live-secret-key
    provider: stripe
    env_key: STRIPE_SECRET_KEY
    severity: critical
    prefix: sk_live_
    regex: '\bsk_live_[0-9a-zA-Z]{16,}\b'
  - id: stripe-live-restricted-key
    provider: stripe
    env_key: STRIPE_RESTRICTED_KEY
    severity: critical
    prefix: rk_live_
    regex: '\brk_live_[0-9a-zA-Z]{16,}\b'
  - id: aws-access-key-id
    provider: aws
    env_key: AWS_ACCESS_KEY_ID
    severity: critical
    prefix: AKIA
    regex: '\b(AKIA|ASIA)[0-9A-Z]{16}\b'
  - id: github-token
    provider: github
    env_key: GITHUB_TOKEN
    severity: critical
    prefix: gh
    regex: '\b(ghp|gho|ghu|ghs|ghr)_[0-9a-zA-Z]{36,}\b'
  - id: github-fine-grained-pat
    provider: github
    env_key: GITHUB_TOKEN
    severity: critical
    prefix: github_pat_
    regex: '\bgithub_pat_[0-9a-zA-Z_]{50,}\b'
# NOTE: anthropic must precede openai — the openai regex would also match
# sk-ant-… keys (patterns are tried in file order, first match wins)
  - id: anthropic-api-key
    provider: anthropic
    env_key: ANTHROPIC_API_KEY
    severity: critical
    prefix: sk-ant-
    regex: '\bsk-ant-[0-9a-zA-Z_-]{24,}\b'
  - id: openai-api-key
    provider: openai
    env_key: OPENAI_API_KEY
    severity: critical
    prefix: sk-
    regex: '\bsk-(proj-)?[0-9a-zA-Z_-]{32,}\b'
  - id: google-api-key
    provider: google
    env_key: GOOGLE_API_KEY
    severity: critical
    prefix: AIza
    regex: '\bAIza[0-9A-Za-z_-]{35}\b'
  - id: slack-token
    provider: slack
    env_key: SLACK_TOKEN
    severity: critical
    prefix: xox
    regex: '\bxox[baprs]-[0-9a-zA-Z-]{10,}\b'
  - id: sendgrid-api-key
    provider: sendgrid
    env_key: SENDGRID_API_KEY
    severity: critical
    prefix: SG.
    regex: '\bSG\.[0-9A-Za-z_-]{16,}\.[0-9A-Za-z_-]{16,}\b'
  - id: twilio-api-key
    provider: twilio
    env_key: TWILIO_API_KEY
    severity: critical
    prefix: SK
    regex: '\bSK[0-9a-f]{32}\b'
  - id: npm-token
    provider: npm
    env_key: NPM_TOKEN
    severity: critical
    prefix: npm_
    regex: '\bnpm_[0-9a-zA-Z]{36}\b'
  # NOTE (C3/03-REVIEW.md): `sbp_[0-9a-f]{40}` is Supabase's *personal
  # access token* format (dashboard/CLI auth), not the project service-role
  # key (which is a JWT — deliberately not pattern-matched here; see the
  # entropy fallback note below). The id/env_key used to claim this was the
  # service-role key, which meant the actual highest-impact Supabase leak
  # shape never matched anything.
  - id: supabase-access-token
    provider: supabase
    env_key: SUPABASE_ACCESS_TOKEN
    severity: critical
    prefix: sbp_
    regex: '\bsbp_[0-9a-f]{40}\b'
  # Supabase's newer (2025+) secret API key format — replaces the
  # service-role JWT for server-side use. Not a JWT, so this is a normal
  # format match (unlike the service-role key, which we intentionally do
  # NOT pattern-match — see the module-level note in secrets.rs on generic
  # JWT detection being a false-positive minefield; the entropy fallback
  # covers it instead).
  - id: supabase-secret-key
    provider: supabase
    env_key: SUPABASE_SECRET_KEY
    severity: critical
    prefix: sb_secret_
    regex: '\bsb_secret_[0-9a-zA-Z]{20,}\b'
  - id: private-key-block
    provider: generic
    env_key: PRIVATE_KEY
    severity: critical
    prefix: '-----BEGIN'
    regex: '-----BEGIN (RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY( BLOCK)?-----'
