id: audit/hardcoded-secret
severity: critical
confidence: high
languages: [javascript, typescript, python]
description: >
  A string literal assigned to a variable/property/keyword-argument
  classifies as a live secret — a known provider key format (Stripe, AWS,
  GitHub, Anthropic, OpenAI, Google, Slack, SendGrid, Twilio, npm, Supabase,
  a PEM private-key block) or, absent a vendor format match, a high-entropy
  value assigned to a secret-suggesting identifier name. Routed exclusively
  through core::secrets (the same classifier `getdev env` uses) — this rule
  never re-implements pattern matching or masking.
message: "Hardcoded secret detected in source"
remediation: >
  Move this value to an environment variable and load it via
  process.env/os.environ at runtime; run `getdev env --write` to extract it
  automatically. Never commit a live secret to source control.
refs:
  - https://getdev.ai/rules/audit/hardcoded-secret
matchers:
  - secret: true
fixtures:
  positive:
    - positive/hardcoded_secret_stripe_js.js
    - positive/hardcoded_secret_github_ts.ts
    - positive/hardcoded_secret_aws_py.py
  negative:
    - negative/hardcoded_secret_neg_env_reference_js.js
    - negative/hardcoded_secret_neg_placeholder_ts.ts
    - negative/hardcoded_secret_neg_unrelated_literal_py.py
    - negative/hardcoded_secret_neg_test_key_js.js
