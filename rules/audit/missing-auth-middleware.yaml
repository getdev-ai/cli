id: audit/missing-auth-middleware
# Demoted 04-07 (docs/SPEC-RULES.md "False-positive policy tie-in"): the
# sentinel corpus measured this rule at 16.1% warning+ FP (5/31 files across
# fastapi-bigger-applications + flask-tutorial-flaskr, corpus.rs
# audit_fp_budget_stays_under_5_percent_per_rule) — the shape-only heuristic
# (single-arg handler / single-decorator route) cannot see auth enforced one
# layer up (an app-wide before_request/dependency-injected auth wrapper,
# both real in these two OSS apps), so it over-fires on exactly that
# legitimate pattern. Demoted all the way to `info` (not merely `low`) per
# policy's "low/info" option: `low` still counts as warning+ under is_
# warning_plus (only `info` is excluded, matching real/nonexistent-api's own
# A3 precedent), and `info` is also below the `[audit] severity_min = "low"`
# default floor, so it stays silent unless a user explicitly opts in with
# `--severity info`. confidence stays `medium` (already heuristic, already
# surfacing `detail` via core::audit's is_heuristic gate) — only severity
# needed to move for this rule to actually drop out of the FP-budget count.
severity: info
confidence: medium
languages: [javascript, typescript, tsx, python]
frameworks: [express, fastapi, flask, nextjs]
description: >
  A route handler declared with no auth-looking guard in its immediate
  syntax: an Express app/router route with a single handler argument and no
  additional middleware in the call, a FastAPI/Flask route decorator with no
  second decorator and no extra arguments (no Depends()/dependencies=.../
  login_required guard), or a Next.js API-route file (selected by
  path_glob, not AST — pages/api/**, app/api/**/route.*) exporting an
  HTTP-verb handler. Heuristic: a route WITH an auth middleware/guard has
  more arguments/decorators than this shape allows, so it does not match.
message: "Route handler has no visible auth middleware/guard"
remediation: >
  Add an auth-checking middleware/guard to this route: an auth middleware
  function in the Express handler chain, a FastAPI Depends()-based guard, a
  Flask @login_required (or equivalent) decorator, or an explicit session/
  token check at the top of the Next.js API-route handler.
refs:
  - https://getdev.ai/rules/audit/missing-auth-middleware
path_glob:
  - "**/*.js"
  - "**/*.mjs"
  - "**/*.cjs"
  - "**/*.jsx"
  - "**/*.ts"
  - "**/*.py"
  - "**/pages/api/**"
  - "**/app/api/**/route.{js,ts,jsx,tsx,mjs,cjs}"
matchers:
  # Express (JS/TS): app.get("/route", handler) / router.post("/route", handler)
  # with exactly one (identifier) handler argument — no middleware chained
  # in front of it.
  - language: javascript
    query: |
      (call_expression
        function: (member_expression
          object: (identifier) @app (#any-of? @app "app" "router")
          property: (property_identifier) @method (#any-of? @method "get" "post" "put" "delete" "patch"))
        arguments: (arguments . (string) @route . (identifier) @finding .))
  - language: typescript
    query: |
      (call_expression
        function: (member_expression
          object: (identifier) @app (#any-of? @app "app" "router")
          property: (property_identifier) @method (#any-of? @method "get" "post" "put" "delete" "patch"))
        arguments: (arguments . (string) @route . (identifier) @finding .))
  # FastAPI / modern-Flask (Python): @app.get("/route") with exactly one
  # decorator (no stacked auth decorator) and exactly one positional arg
  # (no dependencies=[Depends(...)] kwarg).
  - language: tsx
    query: |
      (call_expression
        function: (member_expression
          object: (identifier) @app (#any-of? @app "app" "router")
          property: (property_identifier) @method (#any-of? @method "get" "post" "put" "delete" "patch"))
        arguments: (arguments . (string) @route . (identifier) @finding .))
  # FastAPI / modern-Flask (Python): @app.get("/route") with exactly one
  # decorator (no stacked auth decorator) and exactly one positional arg
  # (no dependencies=[Depends(...)] kwarg).
  - language: python
    query: |
      (decorated_definition
        .
        (decorator
          (call
            function: (attribute
              object: (identifier) @app (#any-of? @app "app" "router")
              attribute: (identifier) @method (#any-of? @method "get" "post" "put" "delete" "patch"))
            arguments: (argument_list . (string) @route .))) @finding
        .
        definition: (function_definition))
  # Classic Flask (Python): @app.route("/route") with exactly one decorator
  # and exactly one positional arg (no methods=[...]/other kwargs).
  - language: python
    query: |
      (decorated_definition
        .
        (decorator
          (call
            function: (attribute
              object: (identifier) @app (#eq? @app "app")
              attribute: (identifier) @method (#eq? @method "route"))
            arguments: (argument_list . (string) @route .))) @finding
        .
        definition: (function_definition))
  # Next.js App Router (JS/TS): export async function GET(request) { ... }
  # under app/api/**/route.* — file selection is path_glob, not AST, so this
  # query intentionally matches any exported HTTP-verb function.
  - language: javascript
    query: |
      (export_statement
        declaration: (function_declaration
          name: (identifier) @fn (#any-of? @fn "GET" "POST" "PUT" "DELETE" "PATCH")
          parameters: (formal_parameters) @finding))
  - language: typescript
    query: |
      (export_statement
        declaration: (function_declaration
          name: (identifier) @fn (#any-of? @fn "GET" "POST" "PUT" "DELETE" "PATCH")
          parameters: (formal_parameters) @finding))
  # Next.js Pages Router (JS/TS): a `handler(req, res)` function declaration
  # under pages/api/** — again, file selection is path_glob, not AST.
  - language: tsx
    query: |
      (export_statement
        declaration: (function_declaration
          name: (identifier) @fn (#any-of? @fn "GET" "POST" "PUT" "DELETE" "PATCH")
          parameters: (formal_parameters) @finding))
  # Next.js Pages Router (JS/TS): a `handler(req, res)` function declaration
  # under pages/api/** — again, file selection is path_glob, not AST.
  - language: javascript
    query: |
      (function_declaration
        name: (identifier) @fn (#eq? @fn "handler")
        parameters: (formal_parameters) @finding)
  - language: typescript
    query: |
      (function_declaration
        name: (identifier) @fn (#eq? @fn "handler")
        parameters: (formal_parameters) @finding)
  - language: tsx
    query: |
      (function_declaration
        name: (identifier) @fn (#eq? @fn "handler")
        parameters: (formal_parameters) @finding)
fixtures:
  positive:
    - positive/missing_auth_express_js.js
    - positive/missing_auth_fastapi_py.py
    - positive/missing_auth_flask_py.py
    - positive/pages/api/missing_auth_nextjs_pages.ts
    - positive/app/api/missing_auth_nextjs_approuter/route.ts
    - positive/app/api/missing_auth_tsx/route.tsx
    - positive/pages/api/missing_auth_tsx.tsx
    - positive/app/api/missing_auth_js/route.js
    - positive/pages/api/missing_auth_js.js
    - positive/missing_auth_express_ts.ts
  negative:
    - negative/missing_auth_neg_express_js.js
    - negative/missing_auth_neg_fastapi_py.py
    - negative/missing_auth_neg_flask_py.py
    - negative/app/dashboard/page.tsx
    - negative/missing_auth_neg_plain_js.js
