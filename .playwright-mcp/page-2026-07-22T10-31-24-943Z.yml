        - heading "Vibe code ships with the same defects, every time" [level=2] [ref=e37]
      - generic [ref=e38]:
        - article [ref=e39]:
          - paragraph [ref=e40]: real/nonexistent-package
          - heading "Hallucinated packages" [level=3] [ref=e41]
          - paragraph [ref=e42]: In published research, roughly one in five AI-generated code samples imports a package that does not exist. Attackers register those names — slopsquatting. getdev verifies every dependency against the real registries.
        - article [ref=e43]:
          - paragraph [ref=e44]: audit/hardcoded-secret
          - heading "Leaked secrets" [level=3] [ref=e45]
          - paragraph [ref=e46]: Agents paste live API keys straight into source. getdev finds them, moves them to .env, rewrites the references, and patches .gitignore — values are shown masked, never printed.
        - article [ref=e47]:
          - paragraph [ref=e48]: review/debug-leftover
          - heading "Agent debris" [level=3] [ref=e49]
          - paragraph [ref=e50]: Dead code, duplicate helpers, debug leftovers, orphaned files. getdev reads the diff the way a reviewer would and lists what the agent left behind.
