        - heading "Non-negotiable by design" [level=2] [ref=e88]
      - generic [ref=e89]:
        - article [ref=e90]:
          - heading "Local-first, private" [level=3] [ref=e91]:
            - generic [ref=e92]: ✓
            - text: Local-first, private
          - paragraph [ref=e93]: "No telemetry, no analytics, no code upload — ever. The only network calls: npm registry, PyPI, GitHub Releases for self-update. Each is documented and verifiable in source. --offline disables all of them."
        - article [ref=e94]:
          - heading "Deterministic core" [level=3] [ref=e95]:
            - generic [ref=e96]: ✓
            - text: Deterministic core
          - paragraph [ref=e97]: No LLM calls anywhere in the core. Same input, same output, every run. A later semantic layer is opt-in only, with your own key or a local model.
        - article [ref=e98]:
          - heading "Safe by default" [level=3] [ref=e99]:
            - generic [ref=e100]: ✓
            - text: Safe by default
          - paragraph [ref=e101]: "Commands never mutate files without explicit --write or --fix. Every mutation is atomic: write, reparse-verify, roll back on failure — with an automatic checkpoint first."
        - article [ref=e102]:
          - heading "Never runs your code" [level=3] [ref=e103]:
            - generic [ref=e104]: ✓
            - text: Never runs your code
          - paragraph [ref=e105]: Pure static analysis — tree-sitter ASTs, not execution. getdev only executes project code if you explicitly opt in (ship --run-build).
        - article [ref=e106]:
          - heading "Rules are data" [level=3] [ref=e107]:
            - generic [ref=e108]: ✓
            - text: Rules are data
          - paragraph [ref=e109]: Detection rules are YAML, not code. Every rule ships with positive and negative test fixtures. Contributing a rule requires zero Rust.
        - article [ref=e110]:
          - heading "One static binary" [level=3] [ref=e111]:
            - generic [ref=e112]: ✓
            - text: One static binary
          - paragraph [ref=e113]: Rust, six release targets across macOS, Linux, and Windows. Install with one command, delete with one command. No runtime, no daemon, no account.
